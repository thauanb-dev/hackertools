<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev — DevTool</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" type='text/css' href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { mono: ['JetBrains Mono','monospace'], display: ['Syne','sans-serif'] },
        colors: { bg:'#0a0e13', surface:'#111720', bdr:'#1e2a38', accent:'#00e5a0', blue:'#0099ff', muted:'#4a6070', danger:'#ff4d6a', body:'#c8d8e8' },
      }
    }
  }
</script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-bg text-body font-mono min-h-screen overflow-x-hidden">
<canvas id="matrix-bg"></canvas>
<div id="toast" class="toast"></div>

<div class="relative z-10 max-w-4xl mx-auto px-5 py-10 pb-24">

  <header class="mb-8 anim-down">
    <a href="index.html" class="text-muted text-[10px] tracking-widest hover:text-accent transition-colors">← back</a>
    <h1 class="font-display font-extrabold text-5xl leading-none text-white tracking-tight mt-2">Dev<span class="text-accent">Tools</span></h1>
    <p class="mt-2 text-[11px] text-muted tracking-widest">→ json · regex · github · color</p>
  </header>

  <!-- JSON Formatter -->
  <section class="bg-surface border border-bdr rounded p-5 mb-5 anim-up">
    <h2 class="text-[11px] tracking-widest text-accent mb-4">// JSON FORMATTER</h2>
    <textarea id="json-input" rows="6" placeholder='{"key": "value", "arr": [1,2,3]}'
      class="w-full bg-bg border border-bdr text-[12px] px-3 py-2 rounded-sm focus:outline-none focus:border-accent placeholder:text-muted mb-2 resize-none"></textarea>
    <div class="flex gap-2 mb-3">
      <button onclick="jsonFormat()" class="border border-accent text-accent text-[10px] tracking-widest px-3 py-1.5 rounded-sm hover:bg-accent hover:text-bg transition-all">FORMAT</button>
      <button onclick="jsonMinify()" class="border border-bdr text-[10px] tracking-widest px-3 py-1.5 rounded-sm hover:border-accent hover:text-accent transition-all">MINIFY</button>
      <button onclick="jsonValidate()" class="border border-bdr text-[10px] tracking-widest px-3 py-1.5 rounded-sm hover:border-blue hover:text-blue transition-all">VALIDATE</button>
      <button onclick="copyEl('json-output')" class="ml-auto text-[10px] text-muted hover:text-accent transition-colors">copy</button>
    </div>
    <pre id="json-output" class="bg-bg border border-bdr rounded-sm p-3 text-[11px] max-h-72 overflow-auto hidden"></pre>
  </section>

  <!-- Regex Tester -->
  <section class="bg-surface border border-bdr rounded p-5 mb-5 anim-up">
    <h2 class="text-[11px] tracking-widest text-blue mb-4">// REGEX TESTER</h2>
    <div class="flex gap-2 mb-3">
      <span class="text-muted text-lg self-center">/</span>
      <input id="regex-pattern" type="text" placeholder="padrão"
        class="flex-1 bg-bg border border-bdr text-[12px] px-3 py-1.5 rounded-sm focus:outline-none focus:border-blue placeholder:text-muted">
      <span class="text-muted text-lg self-center">/</span>
      <input id="regex-flags" type="text" placeholder="gim" maxlength="6"
        class="w-16 bg-bg border border-bdr text-[12px] px-3 py-1.5 rounded-sm focus:outline-none focus:border-blue placeholder:text-muted">
    </div>
    <textarea id="regex-test" rows="5" placeholder="texto para testar..."
      oninput="runRegex()"
      class="w-full bg-bg border border-bdr text-[12px] px-3 py-2 rounded-sm focus:outline-none focus:border-blue placeholder:text-muted mb-2 resize-none"></textarea>
    <button onclick="runRegex()" class="border border-blue text-blue text-[10px] tracking-widest px-4 py-1.5 rounded-sm hover:bg-blue hover:text-bg transition-all mb-3">TEST</button>
    <div id="regex-info" class="hidden text-[10px] text-muted mb-2"></div>
    <div id="regex-output" class="bg-bg border border-bdr rounded-sm p-3 text-[11px] max-h-48 overflow-auto hidden leading-relaxed"></div>
  </section>

  <!-- GitHub User -->
  <section class="bg-surface border border-bdr rounded p-5 mb-5 anim-up">
    <h2 class="text-[11px] tracking-widest text-accent mb-4">// GITHUB USER</h2>
    <div class="flex gap-2 mb-4 items-center">
      <!-- Usar isso como entrada para adicionar os icones do lucide ou do devicon  -->
      <i class="devicon-github-original text-accent" style="font-size: 32px;"></i>
      <input id="gh-user" type="text" placeholder="username"
        class="flex-1 bg-bg border border-bdr text-[12px] px-3 py-1.5 rounded-sm focus:outline-none focus:border-accent placeholder:text-muted">
      <button onclick="ghLookup()" class="border border-accent text-accent text-[11px] tracking-widest px-4 py-1.5 rounded-sm hover:bg-accent hover:text-bg transition-all">FETCH</button>
    </div>
    <div id="gh-result" class="hidden"></div>
  </section>

  <!-- Color Converter -->
  <section class="bg-surface border border-bdr rounded p-5 anim-up">
    <h2 class="text-[11px] tracking-widest text-blue mb-4">// COLOR CONVERTER</h2>
    <!-- TODO deixar de forma dinamica as cores -->
    <div class="flex gap-4 mb-4 items-center">
      <div class="flex ">
        <div id="color-preview" title="Clique para alterar a Cor" class="w-16 h-16 rounded border border-bdr shrink-0 cursor-pointer" style="background:#00e5a0"></div>
        <input class="hidden" type="color" id="color-picker" ></input>
      </div>
      <div class="flex-1 space-y-2">
        <div class="flex items-center gap-2">
          <label class="text-[9px] text-muted tracking-widest w-10">HEX</label>
          <input id="col-hex" type="text" value="#00e5a0" maxlength="7"
            oninput="fromHex()"
            class="flex-1 bg-bg border border-bdr text-[12px] px-3 py-1 rounded-sm focus:outline-none focus:border-blue">
        </div>
        <div class="flex items-center gap-2">
          <label class="text-[9px]  text-muted tracking-widest w-10">RGB</label>
          <input id="col-rgb" type="text" value="0, 229, 160"
            oninput="fromRgb()"
            class="flex-1 bg-bg border border-bdr text-[12px] px-3 py-1 rounded-sm focus:outline-none focus:border-blue"
            placeholder="r, g, b">
        </div>
        <div class="flex items-center gap-2">
          <label class="text-[9px] text-muted tracking-widest w-10">HSL</label>
          <input id="col-hsl" type="text" value="161, 100%, 45%"
            oninput="fromHsl()"
            class="flex-1 bg-bg border border-bdr text-[12px] px-3 py-1 rounded-sm focus:outline-none focus:border-blue"
            placeholder="h, s%, l%">
        </div>
      </div>
    </div>
    <div class="flex gap-2">
      <button onclick="copyEl('col-hex')" class="border border-bdr text-[10px] tracking-widest px-3 py-1.5 rounded-sm hover:border-blue hover:text-blue transition-all">copy hex</button>
      <button onclick="copyRgb()" class="border border-bdr text-[10px] tracking-widest px-3 py-1.5 rounded-sm hover:border-blue hover:text-blue transition-all">copy rgb()</button>
      <button onclick="copyHsl()" class="border border-bdr text-[10px] tracking-widest px-3 py-1.5 rounded-sm hover:border-blue hover:text-blue transition-all">copy hsl()</button>
    </div>
  </section>

</div>
<script src="./js/dev.js"></script>
<script>lucide.createIcons()</script>

</body>
</html>
